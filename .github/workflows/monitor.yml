name: Ticket Price Monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub may delay this slightly under load)
  workflow_dispatch:          # lets you click "Run workflow" manually to test

permissions:
  contents: write            # needed so the workflow can commit state.json back

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run price check
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python check_price.py

      - name: Save state back to the repo
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update price state"
          git push
